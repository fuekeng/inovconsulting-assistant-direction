# ============================================================
#  Application
# ============================================================
spring.application.name=assistant-direction
server.port=${SERVER_PORT:8080}

# ============================================================
#  SQLite — base de données locale
# ============================================================
spring.datasource.url=jdbc:sqlite:${DB_PATH:./data/assistant.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ============================================================
#  Groq / LLM
# ============================================================
groq.api.key=${GROQ_API_KEY}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.max.tokens=${GROQ_MAX_TOKENS:1024}

# ============================================================
#  Session
# ============================================================
# Nombre maximal de tours de conversation conservés en mémoire
session.max.turns=${SESSION_MAX_TURNS:20}

# ============================================================
#  Swagger / SpringDoc
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
#  Logging
# ============================================================
logging.level.com.inovconsulting=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=WARN
