# ============================================================
#  Application
# ============================================================
spring.application.name=assistant-direction
server.port=${SERVER_PORT:8080}

# ============================================================
#  SQLite
# ============================================================
spring.datasource.url=jdbc:sqlite:${DB_PATH:./assistant.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ============================================================
#  Spring AI — Groq (via OpenAI API)
# ============================================================
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=${GROQ_MODEL:llama-3.3-70b-versatile}
spring.ai.openai.chat.options.max-tokens=${GROQ_MAX_TOKENS:1024}

# ============================================================
#  Session
# ============================================================
session.max.turns=${SESSION_MAX_TURNS:20}

# ============================================================
#  Swagger / SpringDoc
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================================
#  Logging
# ============================================================
logging.level.com.inovconsulting=${LOG_LEVEL:INFO}
logging.level.org.springframework.web=WARN
