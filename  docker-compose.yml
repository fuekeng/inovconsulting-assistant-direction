version: "3.9"

services:
  assistant:
    build: .
    container_name: assistant-direction
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/assistant.db
    volumes:
      # Persiste la base SQLite entre les redémarrages
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  sqlite_data:
